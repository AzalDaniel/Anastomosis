# Pre-commit gates. Rule #1 of this repo: no real PHI, ever.
repos:
  - repo: local
    hooks:
      - id: phi-scan
        name: PHI scanner (hashed deny-list + generic patterns)
        entry: python tools/phi_scan.py
        language: system
        pass_filenames: true
        exclude: '^tools/phi_hashes\.json$'

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.7
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-added-large-files
        args: [--maxkb=600]
      - id: check-merge-conflict
      - id: end-of-file-fixer
      - id: trailing-whitespace

# PyPI release via Trusted Publishing (OIDC) — runs only on tag push (v*).
#
# No tokens or secrets: pypi.org must be configured with this repo as a
# trusted publisher (pypi.org → account → Publishing → add pending
# publisher: project "anastomosis", owner "AzalDaniel", repository
# "Anastomosis", workflow "release.yml", environment "pypi"), and a GitHub
# environment named "pypi" must exist (Settings → Environments).
#
# Supply-chain posture (security backlog: "Trusted Publishing + Sigstore"):
# - PEP 740 publish attestations: generated and uploaded by
#   pypa/gh-action-pypi-publish automatically (default since its v1.11.0).
# - SLSA build provenance: attested in the build job via
#   actions/attest-build-provenance and stored with the repo.
# - Build and publish are separate jobs (PyPA guidance): the publish job
#   never runs project code, only uploads the artifact it downloads.

name: Release

on:
  push:
    tags: ["v*"]

# Least-privilege default; each job grants only what it needs.
permissions: {}

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Sigstore signing for the provenance attestation
      attestations: write # persist the attestation to GitHub
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Attest build provenance (SLSA)
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish to PyPI (Trusted Publishing)
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/anastomosis
    permissions:
      id-token: write # OIDC trusted publishing + PEP 740 attestations
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
